server {
    listen 80;
    server_name skrapp.swnds.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name skrapp.swnds.com;

    # Replace these with your real certificate paths.
    ssl_certificate /etc/letsencrypt/live/skrapp.swnds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skrapp.swnds.com/privkey.pem;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:css|js|svg|ico|png|jpg|jpeg|gif|webp)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }
}
