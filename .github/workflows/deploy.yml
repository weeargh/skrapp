name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/skrapp
            git pull origin main

            # Install any new dependencies
            .venv/bin/pip install -r requirements.txt -q

            # Install systemd services if not already present
            cp deploy/skrapp-web.service /etc/systemd/system/skrapp-web.service
            cp deploy/skrapp-worker.service /etc/systemd/system/skrapp-worker.service
            systemctl daemon-reload
            systemctl enable skrapp-web skrapp-worker

            # Stop bare processes if still running (first-time migration)
            pkill -f "gunicorn" 2>/dev/null || true
            pkill -f "run_worker.py" 2>/dev/null || true
            sleep 1

            # Restart via systemd
            systemctl restart skrapp-web
            systemctl restart skrapp-worker

            echo "Deploy complete"
