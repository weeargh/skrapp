name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/skrapp
            git pull origin main

            # Install any new dependencies
            .venv/bin/pip install -r requirements.txt -q

            # Install systemd services if not already present
            cp deploy/skrapp-web.service /etc/systemd/system/skrapp-web.service
            cp deploy/skrapp-worker.service /etc/systemd/system/skrapp-worker.service
            systemctl daemon-reload
            systemctl enable skrapp-web skrapp-worker

            # Stop managed services if they already exist
            systemctl stop skrapp-web skrapp-worker 2>/dev/null || true

            # Stop legacy bare processes from the pre-systemd deploy flow.
            # Avoid pkill -f here because the SSH action runs this script inline,
            # so matching on command text can terminate the deploy shell itself.
            ps -eo pid=,args= | awk '$1 != "'"$$"'" && /[g]unicorn/ {print $1}' | xargs -r kill || true
            ps -eo pid=,args= | awk '$1 != "'"$$"'" && /[r]un_worker\.py/ {print $1}' | xargs -r kill || true
            sleep 1

            # Restart via systemd
            systemctl restart skrapp-web || {
              systemctl status skrapp-web --no-pager || true
              journalctl -u skrapp-web.service -n 100 --no-pager || true
              exit 1
            }
            systemctl restart skrapp-worker || {
              systemctl status skrapp-worker --no-pager || true
              journalctl -u skrapp-worker.service -n 100 --no-pager || true
              exit 1
            }

            echo "Deploy complete"
